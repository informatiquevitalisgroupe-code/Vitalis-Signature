<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signature — Vitalis</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e0e0e0;
      padding: 2rem;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .logo {
      font-size: 22px;
      font-weight: 600;
      color: #c0392b;
      text-align: center;
    }
    .title {
      font-size: 16px;
      color: #333;
      text-align: center;
    }
    label {
      font-size: 14px;
      color: #555;
      margin-bottom: 4px;
      display: block;
    }
    .signature-wrapper {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    canvas {
      border: 1.5px solid #ccc;
      border-radius: 8px;
      background: #fafafa;
      cursor: crosshair;
      touch-action: none;
      width: 100%;
      height: 200px;
    }
    .actions {
      display: flex;
      gap: 12px;
    }
    button {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
      cursor: pointer;
      background: #fff;
      color: #333;
      transition: background 0.15s;
    }
    button:hover { background: #f0f0f0; }
    button.primary {
      background: #c0392b;
      color: #fff;
      border-color: #c0392b;
    }
    button.primary:hover { background: #a93226; }
    .status {
      font-size: 14px;
      text-align: center;
      color: #27ae60;
      min-height: 20px;
    }
    .status.error { color: #c0392b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Vitalis</div>
    <div class="title">Veuillez signer dans le cadre ci-dessous</div>

    <div class="signature-wrapper">
      <label>Votre signature :</label>
      <canvas id="signatureCanvas"></canvas>
    </div>

    <div class="actions">
      <button onclick="effacer()">Effacer</button>
      <button class="primary" onclick="envoyer()">Valider la signature</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    const canvas = document.getElementById('signatureCanvas');
    const ctx = canvas.getContext('2d');

    // Adapter la résolution du canvas à la taille affichée
    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * window.devicePixelRatio;
      canvas.height = rect.height * window.devicePixelRatio;
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    let dessin = false;

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      if (e.touches) {
        return {
          x: e.touches[0].clientX - rect.left,
          y: e.touches[0].clientY - rect.top
        };
      }
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    canvas.addEventListener('mousedown', e => { dessin = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('mousemove', e => { if (!dessin) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
    canvas.addEventListener('mouseup', () => dessin = false);
    canvas.addEventListener('mouseleave', () => dessin = false);

    canvas.addEventListener('touchstart', e => { e.preventDefault(); dessin = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!dessin) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }, { passive: false });
    canvas.addEventListener('touchend', () => dessin = false);

    function effacer() {
      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
      document.getElementById('status').textContent = '';
      document.getElementById('status').className = 'status';
    }

    function estVide() {
      const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      return !data.some(v => v !== 0);
    }

    async function envoyer() {
      const status = document.getElementById('status');
      if (estVide()) {
        status.textContent = 'Veuillez signer avant de valider.';
        status.className = 'status error';
        return;
      }

      status.textContent = 'Envoi en cours...';
      status.className = 'status';

      const imageBase64 = canvas.toDataURL('image/png');

      // ============================================================
      // REMPLACE L'URL CI-DESSOUS PAR TON URL GOOGLE APPS SCRIPT
      // ============================================================
      const APPS_SCRIPT_URL = "COLLE_ICI_TON_URL_APPS_SCRIPT";

      try {
        await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ signature: imageBase64 })
        });
        status.textContent = 'Signature envoyée avec succès !';
        status.className = 'status';
        effacer();
      } catch (err) {
        status.textContent = 'Erreur lors de l\'envoi. Réessayez.';
        status.className = 'status error';
      }
    }
  </script>
</body>
</html>
