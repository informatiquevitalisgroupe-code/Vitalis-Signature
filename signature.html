<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signature</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      padding: 20px;
    }
    h2 { margin-bottom: 20px; color: #333; }
    input[type="text"] {
      width: 400px;
      max-width: 90vw;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #ccc;
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;
    }
    canvas {
      border: 2px solid #333;
      border-radius: 8px;
      background: #fff;
      cursor: crosshair;
      touch-action: none;
    }
    .boutons {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 12px 30px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
    }
    #btnValider { background: #4CAF50; }
    #btnEffacer { background: #f44336; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #message {
      margin-top: 15px;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>Veuillez signer ci-dessous</h2>

  <input type="text" id="nomPrenom" placeholder="Entrez votre Nom et Prénom" required>

  <canvas id="canvas" width="400" height="200"></canvas>

  <div class="boutons">
    <button id="btnValider" onclick="envoyerSignature()">Valider</button>
    <button id="btnEffacer" onclick="effacer()">Effacer</button>
  </div>

  <p id="message"></p>

  <script>
    // ============================================================
    // ZONE À MODIFIER — URL de ton Apps Script déployé
    // ============================================================
    const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbyyvC8E0kz90mtRVElkIyqP5YmrUN2hYDykhQIxiyYoUWFjwxC_FdCA-ZTxLbsJBN0bGA/exec";

    // ============================================================
    // Canvas — dessin de la signature
    // ============================================================
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let dessin = false;
    let aDessiné = false;

    // Souris
    canvas.addEventListener('mousedown', (e) => { dessin = true; aDessiné = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
    canvas.addEventListener('mousemove', (e) => { if (dessin) { ctx.lineTo(e.offsetX, e.offsetY); ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.stroke(); } });
    canvas.addEventListener('mouseup', () => dessin = false);
    canvas.addEventListener('mouseleave', () => dessin = false);

    // Tactile (stylet / doigt)
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); dessin = true; aDessiné = true; const t = e.touches[0]; const rect = canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(t.clientX - rect.left, t.clientY - rect.top); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (dessin) { const t = e.touches[0]; const rect = canvas.getBoundingClientRect(); ctx.lineTo(t.clientX - rect.left, t.clientY - rect.top); ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.stroke(); } });
    canvas.addEventListener('touchend', () => dessin = false);

    // ============================================================
    // Effacer le canvas
    // ============================================================
    function effacer() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      aDessiné = false;
      document.getElementById('message').textContent = '';
    }

    // ============================================================
    // Envoyer la signature à Apps Script
    // ============================================================
    function envoyerSignature() {
      const nomPrenom = document.getElementById('nomPrenom').value.trim();
      const message = document.getElementById('message');

      if (!nomPrenom) {
        message.textContent = '❌ Veuillez entrer votre nom et prénom.';
        message.style.color = 'red';
        return;
      }

      if (!aDessiné) {
        message.textContent = '❌ Veuillez signer avant de valider.';
        message.style.color = 'red';
        return;
      }

      // Désactiver le bouton pendant l'envoi
      document.getElementById('btnValider').disabled = true;
      message.textContent = '⏳ Envoi en cours...';
      message.style.color = '#333';

      const signatureBase64 = canvas.toDataURL('image/png');

      fetch(URL_APPS_SCRIPT, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nomPrenom: nomPrenom,
          signature: signatureBase64
        })
      })
      .then(() => {
        message.textContent = '✅ Signature enregistrée avec succès !';
        message.style.color = 'green';
        // Réinitialiser après 2 secondes pour la personne suivante
        setTimeout(() => {
          effacer();
          document.getElementById('nomPrenom').value = '';
          document.getElementById('btnValider').disabled = false;
          message.textContent = '';
        }, 2000);
      })
      .catch(() => {
        message.textContent = '❌ Erreur lors de l\'envoi. Réessayez.';
        message.style.color = 'red';
        document.getElementById('btnValider').disabled = false;
      });
    }
  </script>

</body>
</html>
